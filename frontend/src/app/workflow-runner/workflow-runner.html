<div class="runner-layout">
  <app-sidebar></app-sidebar>
  <div class="runner-main">
    <div class="runner-toolbar">
      <button (click)="goBackToEditor()" class="btn-back">
        ← 返回编辑器
      </button>
      <div class="toolbar-spacer"></div>
      <button (click)="runSimulation()" [disabled]="isRunning" class="btn-run">
        {{ isRunning ? '运行中...' : '▶ 运行' }}
      </button>
      <button (click)="togglePause()" [disabled]="!isRunning || isStepMode" class="btn-pause">
        {{ isPaused ? '▶ 继续' : '⏸ 暂停' }}
      </button>
      <button (click)="runSingleStep()" [disabled]="isRunning && !isStepMode" class="btn-step">
        {{ isStepMode ? '下一步' : '逐步执行' }}
      </button>
    </div>
    <div class="runner-content">
      <div class="runner-canvas-wrapper">
        <canvas #runnerCanvas></canvas>
        <div class="canvas-hint">
          拖拽节点调整位置 · 双击节点对话
        </div>
      </div>
      <div class="chat-panel">
        <div class="chat-panel-header">对话记录</div>
        <div class="chat-log" #chatLogContainer>
          <div *ngFor="let entry of chatLog" class="chat-entry">
            <div class="chat-entry-header">
              <span class="chat-from">{{ entry.from }}</span>
              <span *ngIf="entry.to" class="chat-arrow">→</span>
              <span *ngIf="entry.to" class="chat-to">{{ entry.to }}</span>
            </div>
            <div class="chat-entry-message">{{ entry.message }}</div>
          </div>
          <div *ngIf="isThinking" class="chat-entry chat-thinking">
            <div class="chat-entry-header">
              <span class="chat-from thinking-agent">{{ thinkingAgent?.role || 'Agent' }}</span>
              <span class="chat-role thinking-role">({{ thinkingAgent?.id }})</span>
            </div>
            <div class="chat-entry-message thinking-message">
              <span class="thinking-dots">正在思考</span>
              <span class="dots-animation">...</span>
            </div>
          </div>
          <div *ngIf="chatLog.length === 0 && !isThinking" class="chat-empty">
            点击运行按钮开始模拟
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<app-agent-editor-panel
  [visible]="showAgentEditor"
  [agent]="selectedAgent"
  (close)="closeAgentEditor()"
  (save)="saveAgentEdits($event)"
></app-agent-editor-panel>

<app-agent-chat-dialog
  [visible]="showAgentChat"
  [agent]="chatAgent"
  (close)="closeAgentChat()"
></app-agent-chat-dialog>
